services:
  backend:
    image: laravel-task-list
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_URL=http://localhost:8080
      - APP_ENV=production
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite

  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8080:80
    depends_on:
      - backend
